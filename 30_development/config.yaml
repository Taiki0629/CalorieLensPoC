# 実験設定の集約点（CLAUDE.md §2-3 数値手打ち禁止の起点）。
# 数値・モデルID・単価・為替・正解kcal はすべてここに置き、コード/記事に直書きしない。
# 未確定は「要確認」。モデル/単価/為替は CAL-3、正解kcal は CAL-4 で実API・公式情報から確定する。

providers:
  openai:
    base_url: null # OpenAI 既定エンドポイント
    api_key_env: OPENAI_API_KEY
  aiand:
    base_url_env: AIAND_BASE_URL # 値は .env（推測禁止・CAL-3で確定）
    api_key_env: AIAND_API_KEY

pricing:
  fx:
    # 両provider とも USD 建て（ai& /models も currency:usd）。為替は §8 の絶対円換算のみに効き、
    # 相対コスト比較（OpenAI vs ai&）には影響しない。CAL-3 で確定（2026-07-08）。
    usd_jpy: 161.87
    ref: "USD/JPY=161.87 tradingeconomics.com/japan/currency（2026-07-07 スナップショット・確認日2026-07-08）"

# CAL-3 で実API(/models)と公式料金から確定（確認日 2026-07-08）。vision は全モデル「テスト画像を
# 実送信し正常応答」を実証（99_scratch/cal3_vision_probe.py・証跡 90_resources/CAL-3_evidence/）。
# 除外モデルと根拠は 20_design/CAL-3-モデル確定.md を参照:
#   qwen/qwen3.6-27b(¥0だが vision 非対応→採用不可)・openai/gpt-oss-120b(vision非対応)・
#   deepseek/glm/deepseek系(vision非対応)・moonshotai/kimi-k2.7-code(code特化のため除外)。
models:
  - id: gpt-5.4
    provider: openai
    label: GPT-5.4（本番推奨の中量級）
    vision: true # 実証: IMG_0420→「幕の内弁当」(2026-07-08, 証跡:CAL-3_evidence/vision_probe_result.json)
    price_input_per_1m: 2.50
    price_output_per_1m: 15.00
    price_currency: usd
    price_ref: "https://developers.openai.com/api/docs/pricing 確認日2026-07-08"
    send_seed: true # seed受理を実APIで実証（2026-07-08）
    enabled: true
  - id: gpt-5.4-mini
    provider: openai
    label: GPT-5.4 Mini（コスト最適化版）
    vision: true # 実証: IMG_0420→「お弁当」（2026-07-08, 証跡:CAL-3_evidence/vision_probe_result.json）
    price_input_per_1m: 0.75
    price_output_per_1m: 4.50
    price_currency: usd
    price_ref: "https://developers.openai.com/api/docs/pricing 確認日2026-07-08"
    send_seed: true # seed受理を実APIで実証（2026-07-08, 証跡:CAL-3_evidence/seed_probe_result.json）
    enabled: true
  - id: google/gemma-4-31b-it
    provider: aiand
    label: Gemma 4 31B it（ai& 最安 vision＝激安の目玉）
    vision: true # 実証: IMG_0420→「弁当」＋/models capability:vision（2026-07-08）
    price_input_per_1m: 0.20
    price_output_per_1m: 0.50
    price_currency: usd # ai& /models も currency:usd
    price_ref: "ai& /models 実API(capability+料金) 確認日2026-07-08 証跡:90_resources/CAL-3_evidence/aiand_models.json"
    send_seed: true # ai&で seed受理を実APIで実証（2026-07-08, 証跡:CAL-3_evidence/seed_probe_result.json）
    enabled: true
  - id: moonshotai/kimi-k2.6
    provider: aiand
    label: Kimi K2.6（ai& 中量級 vision・推論トークン多め）
    vision: true # 実証: IMG_0420→「そぼろ弁当」(completion 3494tok・20s)＋capability:vision（2026-07-08）
    price_input_per_1m: 0.85
    price_output_per_1m: 3.50
    price_currency: usd
    price_ref: "ai& /models 実API(capability+料金) 確認日2026-07-08 証跡:90_resources/CAL-3_evidence/aiand_models.json"
    send_seed: true # ai&で seed受理を実APIで実証（kimi-k2.6, 2026-07-08, 証跡:seed_probe_result.json）
    enabled: true

dishes:
  - id: conbini_bento
    label: コンビニ弁当（三色そぼろ系）
    truth: # CAL-4: kcal をユーザーがパッケージ栄養成分表示から確認（2026-07-08）
      total_kcal: 579 # パッケージ栄養成分表示の総カロリー
      protein_g: 要確認 # パッケージに PFC 等の記載なし（kcal のみ）
      fat_g: 要確認 # 同上
      carb_g: 要確認 # 同上
      product_name: 要確認 # 商品名・購入店・購入日は未取得（CAL-4 残作業）
      source: パッケージ栄養成分表示（ユーザー確認・2026-07-08）。写真証跡は CAL-4 残作業
      checked_on: 2026-07-08
    steps: # アングル積み増し（設計 §3）。derived の JPEG を参照
      S1: [IMG_0420.jpg]
      S2: [IMG_0420.jpg, IMG_0423.jpg]
      S3: [IMG_0420.jpg, IMG_0423.jpg, IMG_0421.jpg]
      S4: [IMG_0420.jpg, IMG_0423.jpg, IMG_0421.jpg, IMG_0425.jpg]
  - id: sukiya_gyudon
    label: すき家 牛丼（並盛）
    truth: # CAL-4: すき家(ゼンショー)公式 栄養成分一覧PDFで確定（2026-07-08）
      total_kcal: 695 # 牛丼 並盛（店内）。※検索値795は「高菜明太マヨ牛丼」で誤り→公式PDFで訂正
      protein_g: 21.7
      fat_g: 23.4
      carb_g: 99.8
      product_name: 牛丼 並盛（店内）
      source: すき家(ゼンショー) 栄養成分一覧 https://images.zensho.co.jp/materials/sukiya/allergen/nutrition.pdf 更新日2026-07-03
      checked_on: 2026-07-08
    # 第三者プロモ写真1枚（moneypost.jp）のため S1 のみ（角度実験は不可）。
    # 画像は著作権により非コミット（.gitignore）。ログは path+sha256 で参照を記録。
    steps:
      S1: [sukiya_gyudon_nami.jpg]

experiment:
  temperature: 0
  seed: 12345 # 再現性のため対応プロバイダに送る（30_development/CLAUDE.md §5）
  trials: 3
  max_json_retries: 2
  prompt_version: v1

cost_scenario:
  daily_requests: 10000 # DAU 1万 × 1人1回撮影（出所: 背景.md §8。確定シナリオ・要確認ではない）

image:
  max_dim: 1024
  jpeg_quality: 85
  # HEIC 原本→JPEG 変換の元ファイル（steps の JPEG に対応する .HEIC）。convert-images が使用
  originals:
    IMG_0420.jpg: IMG_0420.HEIC
    IMG_0421.jpg: IMG_0421.HEIC
    IMG_0422.jpg: IMG_0422.HEIC
    IMG_0423.jpg: IMG_0423.HEIC
    IMG_0424.jpg: IMG_0424.HEIC
    IMG_0425.jpg: IMG_0425.HEIC
  # コンタクトシートに並べる順（設計 §8.1）
  contact_sheet_order:
    - [S1, IMG_0420.jpg, ほぼ真上]
    - [S2, IMG_0423.jpg, 斜め上~55]
    - [S3, IMG_0421.jpg, やや低い~40]
    - [S4, IMG_0425.jpg, 低い~24]
    - [予備, IMG_0422.jpg, ~50]
    - [予備, IMG_0424.jpg, ~30]

paths:
  resources_dir: ../90_resources # HEIC 原本（30_development から見た相対）
  derived_dir: data/derived # 変換済み JPEG（image_refs のパス基準）
  logs_dir: data/logs
  results_dir: data/results
